<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineNet - Biblioteca Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen">
        <div class="auth-bg"></div>
        <div class="auth-box-wrapper">
            <div class="auth-box">
                <div class="logo" style="margin-bottom: 30px; text-align: center; font-size: 32px;">
                    <span style="color: #E50914; font-weight: 900;">CINE</span><span style="color: white; font-weight: 900;">NET</span>
                </div>
                <h2 id="auth-title">Aceder ao Portal</h2>
                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="input-group">
                        <input type="email" id="auth-user" required placeholder=" ">
                        <label>Email</label>
                    </div>
                    <div class="input-group">
                        <input type="password" id="auth-pass" required placeholder=" ">
                        <label>Palavra-passe</label>
                    </div>
                    <button type="submit" class="btn-auth" id="auth-btn">Entrar</button>
                </form>
                <p class="auth-switch">
                    <span style="color: #999;">Novo no sistema?</span>
                    <a href="#" onclick="toggleAuthMode()" id="auth-link" style="color: white; text-decoration: none; font-weight: bold;">Registe-se agora.</a>
                </p>
                <p id="auth-error" class="error-message" style="display:none; color: white; background: #e87c03; padding: 10px; border-radius: 4px; margin-top: 15px; font-size: 14px; text-align: center;"></p>
            </div>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        
        <header id="navbar">
            <div class="nav-top-main">
                <div class="nav-left">
                    <a href="#" class="logo" onclick="limparBusca(); window.scrollTo(0,0);">CINENET</a>
                    <ul class="nav-links">
                        <li><a href="#homepage-content">Início</a></li>
                        <li><a href="#row-movies-section">Filmes</a></li>
                        <li><a href="#row-series-section">Séries</a></li>
                        <li><a href="#row-animes-section">Animes</a></li>
                        <li><a href="#row-cartoons-section">Desenhos</a></li>
                        <li><a href="#row-watchlist-section">A Minha Lista</a></li>
                    </ul>
                </div>
                <div class="search-box">
                    <span style="margin-right: 8px;">🔍</span>
                    <input type="text" id="search-input" placeholder="Títulos, animes, desenhos...">
                </div>
                <button onclick="fazerLogout()" style="background: transparent; border: 1px solid #E50914; color: #E50914; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-left: 15px; font-weight: bold;">Sair</button>
            </div>
        </header>

        <div id="search-results-section">
            <h2 class="row-title" id="search-title">Resultados da Pesquisa</h2>
            <div class="search-grid" id="search-grid"></div>
        </div>

        <div id="homepage-content">
            <div class="hero-banner" id="hero-banner">
                <div class="hero-content">
                    <div class="hero-title" id="hero-title">A carregar...</div>
                    <div class="hero-synopsis" id="hero-synopsis">A procurar os melhores títulos...</div>
                    <div class="hero-buttons">
                        <button class="btn btn-play" id="hero-play-btn">▶ Assistir Agora</button>
                    </div>
                </div>
            </div>

            <div class="main-container" id="rows-wrapper-layout">
                </div>
        </div>

        <div class="modal" id="detailsModal">
            <div class="modal-content">
                <span class="modal-close" onclick="fecharModal()">✕</span>
                <div class="modal-hero" id="modal-hero-bg">
                    <div class="modal-hero-content">
                        <h2 id="modal-title">Título</h2>
                        <div class="modal-actions">
                            <button class="btn btn-play" style="padding: 10px 24px; font-size: 15px;" onclick="abrirPlayerAtual('geral')">▶ Assistir Obra Completa</button>
                            <button class="btn btn-play" style="padding: 10px 24px; font-size: 15px; background: #e5e5e5; margin-left: 10px;" id="btn-player-especifico" onclick="abrirPlayerAtual('especifico')">🔢 Escolher Ep. Específico</button>
                            <button class="btn btn-info" style="padding: 10px 24px; font-size: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.4);" id="modal-watchlist-btn" onclick="toggleWatchlist()">+ A Minha Lista</button>
                        </div>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="modal-info-column">
                        <div class="meta-container">
                            <span class="match-score" id="modal-match">98% Relevante</span>
                            <span id="modal-year">2026</span>
                            <span class="info-tag">HD 4K</span>
                        </div>
                        <p id="modal-desc" style="color: #e5e5e5; font-size: 15px; line-height: 1.5; margin: 0;"></p>
                    </div>
                    <div class="modal-review-column">
                        <div class="review-card-area">
                            <b style="font-size: 13px; display:block; margin-bottom:6px; color: #999;">AVALIAR OBRA</b>
                            <div class="stars" id="star-rating">
                                <span onclick="definirEstrelas(1)">★</span><span onclick="definirEstrelas(2)\">★</span><span onclick="definirEstrelas(3)\">★</span><span onclick="definirEstrelas(4)\">★</span><span onclick="definirEstrelas(5)\">★</span>
                            </div>
                            <textarea class="review-input" id="review-text" placeholder="Gostou? Escreva as suas notas aqui..."></textarea>
                            <button class="mini-btn" style="background: white; color: black; width: 100%; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer;" onclick="salvarCritica()">Guardar Avaliação</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="player-modal" id="playerModal">
            <div class="player-header">
                <span class="player-close" onclick="fecharPlayer()">⬅ Voltar ao Catálogo</span>
                
                <div class="player-controls-panel" id="episodes-selectors-box" style="display:none;">
                    <label>Temp:</label>
                    <input type="number" id="player-season-input" value="1" min="1" onchange="atualizarIframePlayer('especifico')">
                    <label>Ep:</label>
                    <input type="number" id="player-episode-input" value="1" min="1" onchange="atualizarIframePlayer('especifico')">
                </div>
            </div>

            <div class="player-content">
                <iframe id="videoPlayer" src="" width="100%" height="600" frameborder="0" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
