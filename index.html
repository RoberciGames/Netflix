<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineNet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="navbar">
        <div class="nav-left">
            <a href="#" class="logo" onclick="limparBusca(); window.scrollTo(0,0);">CINENET</a>
            <ul class="nav-links">
                <li><a href="#hero-banner">Início</a></li>
                <li><a href="#row-movies-section">Filmes</a></li>
                <li><a href="#row-series-section">Séries</a></li>
                <li><a href="#row-animes-section">Animes</a></li>
                <li><a href="#row-cartoons-section">Desenhos</a></li>
                <li><a href="#row-watchlist-section">A Minha Lista</a></li>
            </ul>
        </div>
        <div class="search-box">
            <span style="margin-right: 8px;">🔍</span>
            <input type="text" id="search-input" placeholder="Títulos, animes, desenhos...">
        </div>
    </header>

    <div id="search-results-section">
        <h2 class="row-title" id="search-title">Resultados da Pesquisa</h2>
        <div class="search-grid" id="search-grid"></div>
    </div>

    <div id="homepage-content">
        <div class="hero-banner" id="hero-banner">
            <div class="hero-content">
                <div class="hero-title" id="hero-title">Carregando...</div>
                <div class="hero-synopsis" id="hero-synopsis">Buscando as produções mais recomendadas...</div>
                <div class="hero-buttons">
                    <button class="btn btn-play" id="hero-play-btn">▶ Assistir Agora</button>
                    <button class="btn btn-info" id="hero-info-btn">ℹ️ Mais Informações</button>
                </div>
            </div>
        </div>

        <div class="main-container" id="rows-wrapper-layout"></div>
    </div>

    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <span class="modal-close" onclick="fecharModal()">✕</span>
            <div class="modal-hero" id="modal-hero-bg">
                <div class="modal-hero-content">
                    <h2 id="modal-title">Nome da Produção</h2>
                    <div class="modal-actions">
                        <button class="btn btn-play" style="padding: 10px 24px; font-size: 15px;" onclick="abrirPlayerAtual()">▶ Assistir</button>
                        <button class="btn btn-info" style="padding: 10px 24px; font-size: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.4);" id="modal-watchlist-btn" onclick="toggleWatchlist()">+ A Minha Lista</button>
                    </div>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-info-column">
                    <div class="meta-container">
                        <span class="match-score" id="modal-match">94% Relevante</span>
                        <span id="modal-year">2026</span>
                        <span class="info-tag">4K ULTRA HD</span>
                    </div>
                    <p id="modal-desc" style="color: #e5e5e5; font-size: 15px; line-height: 1.5; margin: 0;"></p>
                </div>
                <div class="modal-review-column">
                    <div class="review-card-area">
                        <b style="font-size: 13px; display:block; margin-bottom:6px; color: var(--text-grey);">AVALIAR OBRA</b>
                        <div class="stars" id="star-rating">
                            <span onclick="definirEstrelas(1)">★</span><span onclick="definirEstrelas(2)">★</span><span onclick="definirEstrelas(3)">★</span><span onclick="definirEstrelas(4)">★</span><span onclick="definirEstrelas(5)">★</span>
                        </div>
                        <textarea class="review-input" id="review-text" placeholder="Adicionar notas sobre os episódios ou filme..."></textarea>
                        <button class="mini-btn" style="background: white; color: black; width: 100%; padding: 10px;" onclick="salvarCritica()">Salvar Avaliação</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="player-modal" id="playerModal">
        <div class="player-header">
            <span class="player-close" onclick="fecharPlayer()">⬅ Voltar</span>
            
            <div class="player-controls-panel" id="episodes-selectors-box" style="display:none;">
                <label>Temporada:</label>
                <input type="number" id="player-season-input" value="1" min="1" onchange="atualizarIframePlayer()">
                <label>Episódio:</label>
                <input type="number" id="player-episode-input" value="1" min="1" onchange="atualizarIframePlayer()">
            </div>
        </div>
        
        <div class="player-content">
            <iframe id="videoPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
