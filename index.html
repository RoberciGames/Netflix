<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineNet</title>
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen">
        <div class="auth-bg-netflix"></div>
        <div class="auth-container-netflix">
            <div class="auth-card">
                <div class="app-brand" style="margin-bottom: 20px; text-align: center;">
                    <span class="brand-accent">CINE</span><span class="brand-light">NET</span>
                </div>
                <h2 id="auth-title">NÚCLEO DE TRANSMISSÃO</h2>
                <p class="auth-subtitle" style="text-align: center; color: #aaaaaa; margin-bottom: 20px; font-size: 14px;">Insira as suas credenciais de acesso</p>
                
                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="input-netflix">
                        <input type="email" id="auth-user" required placeholder=" ">
                        <label>Email de Utilizador</label>
                    </div>
                    <div class="input-netflix">
                        <input type="password" id="auth-pass" required placeholder=" ">
                        <label>Chave de Segurança</label>
                    </div>
                    <button type="submit" class="btn-netflix" id="auth-btn">AUTENTICAR SISTEMA</button>
                    
                    <button type="button" class="btn-guest" style="width: 100%; margin-top: 16px;" onclick="entrarComoConvidado()">🌐 ENTRAR COMO CONVIDADO</button>
                </form>
                
                <div class="auth-footer-netflix">
                    <div class="auth-switch-wrapper" style="text-align: center; margin-top: 20px;">
                        <span id="auth-switch-text" style="color: #737373; font-size: 14px;">Novo por aqui?</span>
                        <button onclick="toggleAuthMode()" id="auth-link" style="background: none; border: none; color: #fff; cursor: pointer; text-decoration: underline; margin-left: 5px; font-family: 'Outfit';">Criar conta de acesso</button>
                    </div>
                </div>
                <div id="auth-error" class="alert-box" style="display:none; margin-top: 15px; color: #E50914; text-align: center; font-size: 14px;"></div>
            </div>
        </div>
    </div>

    <div class="player-overlay" id="playerModal">
        <header class="player-top-bar panel-glass">
            <button class="btn-back-player" onclick="fecharPlayer()">⬅ FECHAR REPRODUTOR</button>
            <div class="series-control-hub" id="episodes-selectors-box" style="display:none;">
                <div class="control-unit">
                    <label>TEMPORADA</label>
                    <input type="number" id="player-season-input" class="input-number-glass" value="1" min="1" onchange="atualizarIframePlayer()">
                </div>
                <div class="control-unit">
                    <label>EPISÓDIO</label>
                    <input type="number" id="player-episode-input" class="input-number-glass" value="1" min="1" onchange="atualizarIframePlayer()">
                </div>
            </div>
        </header>
        <div class="player-viewport">
            <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" scrolling="no"></iframe>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="script.js"></script>
</body>
</html>
